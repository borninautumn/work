    /* 인트로 섹션 */
    
    /* 인트로 */
    #intro { 
        position: fixed; 
        inset: 0; 
        z-index: 100; 
        background: #000; 
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.3s steps(2); /* 점멸 느낌을 위한 짧은 전환 */
    }
    .into_btm_txt { position: absolute; top: 49.72%; left: 50%; transform: translateX(-50%); }
    .into_txt_wrap {

    }
    /* 마지막 마침표 깜빡임 */
    .last-dot { animation: dotBlink 0.8s infinite; }
    @keyframes dotBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
    }

    /* 메인 섹션: 점멸하듯 나타나는 효과 */
    .main-content {
        display: none; 
        position: relative; width: 100%; height: 100vh;
    }
    .main-content.show {
        display: block;
        animation: impact-in 0.4s ease-out; /* 확 나타나는 효과 */
    }
    @keyframes impact-in {
        0% { transform: scale(1.1); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* 전광판(Marquee) 설정 */
    .marquee-container {
        width: 100%; 
        overflow: hidden;
        background: transparent;
        position: absolute; top: 36.39%;
        z-index: 2;
        pointer-events: none; /* 클릭 방해 금지 */
    }
    .marquee-text {
        display: flex;
        width: fit-content;
        animation: marquee-img 60s linear infinite;
    }
    .marquee-text img {
        display: block; height: 150px;
        padding-right: 320px;
    }
    @keyframes marquee-img {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
    }

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const textElement = document.getElementById('typing-text');
        const content = "Be Bold. Be You. Be.";
        let index = 0;
        const typingSpeed = 250;

        // 1. 타이핑 함수를 먼저 선언하고 실행
        function type() {
            if (!textElement) return;
            if (index < content.length) {
                const char = content.charAt(index);
                if (index === content.length - 1 && char === '.') {
                    const dotSpan = document.createElement('span');
                    dotSpan.className = 'last-dot';
                    dotSpan.textContent = char;
                    textElement.appendChild(dotSpan);
                    startTransition(); 
                } else {
                    const textNode = document.createTextNode(char);
                    textElement.appendChild(textNode);
                }
                index++;
                setTimeout(type, typingSpeed);
            }
        }

        function startTransition() {
            setTimeout(() => {
                const intro = document.getElementById('intro');
                const main = document.getElementById('main');
                if (intro && main) {
                    intro.style.opacity = '0';
                    setTimeout(() => {
                        intro.style.display = 'none';
                        main.classList.add('show');
                        // swiper autoplay start
                        if (swiper) {
                            swiper.slideTo(0, 0);
                            swiper.autoplay.start();
                        }
                    }, 600);
                }
            }, 2500);
        }

        // 타이핑 시작
        setTimeout(type, 100);

        // Swiper
        let swiper;
        swiper = new Swiper('.campaignSwiper', {
            spaceBetween: 0,
            autoplay: false,
            loop: true,
            navigation: {
                nextEl: '.arrow-next',
                prevEl: '.arrow-prev',
            },
            // tab과 연결
            on: {
                // 스와이프해서 슬라이드 바뀔 때 실행
                slideChange: function() {
                    const tabs = document.querySelectorAll('.campaign_tab');
                    const currentIndex = this.realIndex; // 현재 활성화된 슬라이드 인덱스
                    // 모든 탭의 'sel' 클래스 제거하고 현재 인덱스에만 추가
                    tabs.forEach((tab, index) => {
                        if (index === currentIndex) {
                            tab.classList.add('sel');
                        } else {
                            tab.classList.remove('sel');
                        }
                    });
                }
            }
        });

        // 2. 탭 이벤트
        const tabs = document.querySelectorAll('.campaign_tab');
        tabs.forEach((tab, index) => {
            tab.addEventListener('click', function() {
                // 클릭한 탭의 인덱스로 슬라이드 이동
                swiper.slideToLoop(index);
                // 탭 활성화 (즉각적 반응 위해 추가함)
                tabs.forEach(t => t.classList.remove('sel'));
                this.classList.add('sel');
            });
        });
    });

    swiper.autoplay.stop();
</script>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

<style>

    body { margin: 0; padding: 0; background-color: #000; overflow-x: hidden; }
    .campaign_container { position: relative; max-width: 800px; width: 100%; height: 100dvh; overflow: hidden; margin: 0 auto; }
    .campaign_container img { display: block; width: 100%; }

    /* [INTRO] */
    #intro { 
        position: fixed; inset: 0; z-index: 1000; background: #000; 
        display: flex; align-items: center; justify-content: center;
        transition: opacity 0.6s ease-in-out; will-change: opacity;
        height: 100dvh;
    }
    #intro > img { width: 100%; height: 100dvh; object-fit: cover; }
    .intro_btm_txt { position: absolute; top: 48.7%; left: 50%; transform: translateX(-50%); width: 56.75%; }

    .last-dot { animation: dotBlink 0.8s infinite; }
    @keyframes dotBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* [MAIN CONTENT] */
    .main-content {
        display: block; position: fixed; inset: 0; z-index: 1; 
        opacity: 0; visibility: hidden; transition: opacity 0.8s ease; 
        overflow: hidden;
        -webkit-transform-style: preserve-3d;
        transform-style: preserve-3d;
    }
    .main-content.show { opacity: 1; visibility: visible; animation: impact-in 0.6s ease-out forwards; }
    @keyframes impact-in { 0% { transform: scale(1.1); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* [SWIPER BASE] */
    .campaignSwiper { width: 100%; height: 100%; }
    .swiper-slide { 
        position: relative; width: 100%; height: 100%; 
        -webkit-transform-style: preserve-3d;
        transform-style: preserve-3d;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const textElement = document.getElementById('typing-text');
        const content = "Be Bold. Be You. Be.";
        let index = 0;
        const typingSpeed = 150;

        function type() {
            if (!textElement) return;
            if (index < content.length) {
                const char = content.charAt(index);
                if (index === content.length - 1 && char === '.') {
                    const dotSpan = document.createElement('span');
                    dotSpan.className = 'last-dot';
                    dotSpan.textContent = char;
                    textElement.appendChild(dotSpan);
                    startTransition(); 
                } else {
                    const textNode = document.createTextNode(char);
                    textElement.appendChild(textNode);
                }
                index++;
                setTimeout(type, typingSpeed);
            }
        }

        let swiper = new Swiper('.campaignSwiper', {
            loop: true,
            autoplay: { delay: 3000, disableOnInteraction: false },
            navigation: { nextEl: '.arrow-next', prevEl: '.arrow-prev' },
            watchSlidesProgress: true,
            observer: true,
            observeParents: true,
            on: {
                slideChange: function() {
                    const tabs = document.querySelectorAll('.campaign_tab');
                    const currentIndex = this.realIndex;
                    tabs.forEach((tab, i) => tab.classList.toggle('sel', i === currentIndex));
                }
            }
        });

        swiper.autoplay.stop();

        function startTransition() {
            setTimeout(() => {
                const intro = document.getElementById('intro');
                const main = document.getElementById('main');
                if (intro && main) {
                    main.classList.add('show');
                    if (swiper) { 
                        swiper.update(); 
                        swiper.loopFix();
                        swiper.slideToLoop(0, 0); 
                    }
                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            intro.style.opacity = '0';
                            setTimeout(() => {
                                intro.style.display = 'none';
                                if (swiper) swiper.autoplay.start();
                            }, 600);
                        }, 50);
                    });
                }
            }, 3000);
        }

        document.querySelectorAll('.campaign_tab').forEach((tab, i) => {
            tab.addEventListener('click', () => swiper.slideToLoop(i));
        });

        setTimeout(type, 100);
        const logo = document.querySelector('.campaign_logo');
        if (logo) logo.addEventListener('click', () => location.reload());
    });
</script>
