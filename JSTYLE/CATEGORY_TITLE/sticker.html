    .sticker:active { cursor: grabbing; }
    .sticker img {

        -webkit-user-drag: none;

<!-- 스티커 드래그 영역 -->


<!-- GSAP CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Draggable.min.js"></script>

<script>
gsap.registerPlugin(Draggable);

Draggable.create(".sticker", {
    type: "x,y",
    bounds: ".introArea",
    inertia: true,
    edgeResistance: 0.85,
    allowNativeTouchScrolling: false, // 모바일에서 스크롤과 충돌 방지
    dragClickables: false,

    onDragStart() {
        gsap.to(this.target, {
        scale: 1.1,
        duration: 0.15,
        ease: "power2.out"
        });
        this.target.style.zIndex = 6; // 스티커 레이어 안에서만 살짝 위로
    },
    onDragEnd() {
        gsap.to(this.target, {
        scale: 1,
        duration: 0.2,
        ease: "power2.out"
        });
        this.target.style.zIndex = 5; // 원래 값으로 복귀
    },
    onThrowUpdate() {
        this.applyBounds(); // ← 던지는 중에도 경계 체크해서 즉시 보정
    },
});
</script>
