<script>
  $(function () {
    // 12시 마감(오늘도착), 16시 마감(내일도착) 타이머 초기화
    initCountdown(12, '.clock01', '.time_notice01', "오늘도착이 마감되었습니다");
    initCountdown(16, '.clock02', '.time_notice02', "내일도착이 마감되었습니다");
  
    function initCountdown(targetHour, clockSelector, noticeSelector, message) {
        const $clock = $(clockSelector);
        const $notice = $(noticeSelector);
        
        const isTimerActive = true; // true = 타이머 on / false = 타이머 off
  
        function updateTimer() {
            const now = new Date();
            const day = now.getDay(); // 0(일)~6(토)
            const end = new Date();
            
            end.setHours(targetHour, 0, 0, 0); 
  
            let diff = end - now;
  
            // [조건] 평일(월~금)이고 시간이 남았을 때만 타이머 작동
            // 주말(토,일)이거나 시간이 지났으면 00:00:00 처리
            if (day >= 1 && day <= 5 && diff > 0) {
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / (1000 * 60)) % 60);
                const s = Math.floor((diff / 1000) % 60);
  
                // 시, 분, 초를 각각의 span에 할당
                $clock.find('.h').text(h < 10 ? "0" + h : h);
                $clock.find('.m').text(m < 10 ? "0" + m : m);
                $clock.find('.s').text(s < 10 ? "0" + s : s);
                
                $notice.hide(); // 시간 남았을 땐 공지 숨김
            } else {
                // 주말이거나 마감 시간이 지났을 때
                $clock.find('.h, .m, .s').text("00");
                $notice.text(message).show().addClass("color_bk");
            }
        }
  
        if (isTimerActive) {
            // 즉시 실행 후 1초마다 반복 (실시간의 핵심)
            updateTimer();
            setInterval(updateTimer, 1000);
        }
    }
  });
</script>
