<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />

<style>
    .live__container img { display: block; width: 100%; }
    .live__container {
        max-width: 772px;
        margin: 0 auto;
        position: relative;
        box-sizing: border-box;
    }
    
    /* 동영상 관련 CSS */
    .live__wrap { position: relative; } 
    .vedio__container .vedio--controller { height: 100% !important; }
    .aspect {
        aspect-ratio: 9/16;
        width: 60%;
        overflow: hidden;
        position: absolute;
        top: 43%; left: 50%;
        transform: translate(-50%, -50%);
        margin-left: 0;
        padding-left: 0;
        filter: drop-shadow(2px 4px 6px #413652);
    }
    .aspect iframe { width: 100%; height: 100%; }

    /* 링크 공유 */
    .live__container .copyBtn { display: block; }

    /* 모바일에선 이거 추가 */
    .ytp-offline-slate-button-text { margin: 0 !important; }
</style>

<section class="live__container">
    <div class="intro">
        <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_01.jpg" alt="intro image" />
    </div>
    <!-- 라방 영상 -->
    <div class="live__wrap">
        <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_02.jpg" alt="live layout background image" />
        <div class="vedio__container">
            <div class="vedio--controller">
                <figure class="aspect">
                    <!-- 본 영상 -->
                    <!-- <iframe src="https://youtube.com/embed/5Q8Ggu3PPrI" title="YouTube video player" frameBorder="0"
                        allowFullScreen></iframe> -->
                    <!-- 예고 영상 -->
                    <video width="100%" height="100%" autoplay loop muted>
                        <source src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/0319_preview.mp4" type="video/mp4" />
                    </video>
                </figure>
            </div>
        </div>
    </div>
    <!-- 모델 인포 -->
    <div class="modelInfo">
        <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_03.jpg" alt="model info image" />
    </div>
    <!-- 이벤트 -->
    <div class="event__wrap">
        <!-- 적립금 다운 -->
        <a href="/shop/down_reserve.html?reservenum=QlI0WEpSSlg=">
            <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_05.jpg" />
        </a>
    
        <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_06.jpg" />
        <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_07.jpg" />
        
        <!-- url 공유 -->
        <a href="javascript:;" class="copyBtn">
            <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_08.jpg" alt="img1">
        </a>
        <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0319_live/live_m_250319_09.jpg" alt="img1">
    </div>
</section>

<script>
    function init() {
        urlCopy();
    }

    // URL 복사
    function urlCopy() {
        const copyBtn = document.querySelector('.copyBtn');
        copyBtn.addEventListener('click', function() {
            copy(window.location.href);
        });

        const copy = (text) => {
            const $textarea = document.createElement("textarea");
            document.body.appendChild($textarea);
            $textarea.value = text;
            $textarea.select();
            document.execCommand("copy");
            document.body.removeChild($textarea);
            alert("URL이 복사가 완료되었습니다.");
        };
    }

    init();
</script>
