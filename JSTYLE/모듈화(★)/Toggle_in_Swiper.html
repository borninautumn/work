    /* detail을 숨김 */
    .detail {
        max-height: 0;
        overflow: hidden;

        opacity: 0;
    }

    /* 활성화될 때 애니메이션 적용 */

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function () {
    const btns = document.querySelectorAll(".btn");

    btns.forEach((btn, index) => {
        const detail = btn.nextElementSibling;
        let swiperInstance = null;

        btn.addEventListener("click", function () {
            const isActive = detail.classList.contains("active");

            if (isActive) {
                // 닫기
                detail.style.maxHeight = detail.scrollHeight + "px"; // 현재 높이 유지
                setTimeout(() => {
                    detail.style.maxHeight = "0px"; // 줄어드는 애니메이션
                }, 10);
                detail.classList.remove("active");

                setTimeout(() => {
                    if (swiperInstance) {
                        swiperInstance.destroy(true, true);
                        swiperInstance = null;
                    }
                }, 500);
            } else {
                // 열기
                detail.classList.add("active");
                detail.style.maxHeight = detail.scrollHeight + "px"; // 실제 콘텐츠 높이로 설정

                setTimeout(() => {
                    swiperInstance = new Swiper(`.mySwiper${index + 1}`, {
                        loop: true,
                        autoplay: { delay: 3000 },
                        slidesPerView: 3.2,
                        spaceBetween: 20,
                    });
                }, 500);
            }
        });
    });
});
</script>
