<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <title>FlipClock 테스트</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.2/flipclock.css" />
    <style>
        .time-segment {
            display: inline-block;
            margin: 0 5px;
        }

        .time-segment .flip-clock-wrapper {
            width: 80px !important;
        }

        .label {
            text-align: center;
            font-weight: bold;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <h1>2025년 8월 1일 카운트다운</h1>
    <div id="countdown">
        <div class="time-segment">
            <div id="hours"></div>
            <div class="label">시</div>
        </div>
        <div class="time-segment">
            <div id="minutes"></div>
            <div class="label">분</div>
        </div>
        <div class="time-segment">
            <div id="seconds"></div>
            <div class="label">초</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flipclock/0.7.2/flipclock.min.js"></script>
    <script>
        $(function () {
            const targetDate = new Date('2025-08-01T00:00:00');

            // autoStart: true로 변경
            const clockHours = $('#Hours').FlipClock(0, {
                clockFace: 'Counter',
                autoStart: true
            });
            const clockMinutes = $('#minutes').FlipClock(0, {
                clockFace: 'Counter',
                autoStart: true
            });
            const clockSeconds = $('#seconds').FlipClock(0, {
                clockFace: 'Counter',
                autoStart: true
            });

            function updateCountdown() {
                const now = new Date();
                let diff = Math.floor((targetDate - now) / 1000);
                if (diff < 0) diff = 0;

                const hours = Math.floor(diff / 3600);
                const minutes = Math.floor((diff % 3600) / 60);
                const seconds = diff % 60;

                clockHours.setTime(hours);
                clockMinutes.setTime(minutes);
                clockSeconds.setTime(seconds);
            }

            updateCountdown();
            setInterval(updateCountdown, 1000);
        });
    </script>

</body>

</html>
