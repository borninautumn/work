<style>
.timer1__wrap { position: relative; max-width: 900px;}
/* 타이머 */
.timer {
    width: 100%;
    display: flex;
    flex-direction: row;
    position: absolute !important;
    justify-content: center;
    align-items: center;
    padding: 0; margin: 0;
}
.timer1 {
    top: 41.54%;
    color: #000;
}
.timer2 {
    top: 45.78%;
    color: #000;
}
.timer #timer1-day1,
.timer #timer1-day2,
.timer #timer1-hour1,
.timer #timer1-hour2,
.timer #timer1-min1,
.timer #timer1-min2,
.timer #timer1-sec1,
.timer #timer1-sec2,
.timer #timer2-day1,
.timer #timer2-day2,
.timer #timer2-hour1,
.timer #timer2-hour2,
.timer #timer2-min1,
.timer #timer2-min2,
.timer #timer2-sec1,
.timer #timer2-sec2 { 
    position: absolute; 
    top: 0; 
    width: auto;
    font-size: 3em;
    width: 10%;
    text-align: center;
    line-height: 1.35;
}
/* 시간, 분, 초
.timer #timer1-hour1, .timer #timer2-hour1 { left: 14.89%; }
.timer #timer1-hour2, .timer #timer2-hour2 { left: 25.78%; }
.timer #timer1-min1, .timer #timer2-min1 { left: 39.67%; }
.timer #timer1-min2, .timer #timer2-min2 { left: 50.56%; }
.timer #timer1-sec1, .timer #timer2-sec1 { left: 64.44%; }
.timer #timer1-sec2, .timer #timer2-sec2 { left: 75.33%; }
 */
/* 일, 시간, 분*/
.timer #timer1-day1, .timer #timer2-day1 { left: 14.89%; }
.timer #timer1-day2, .timer #timer2-day2 { left: 25.78%; }
.timer #timer1-hour1, .timer #timer2-hour1 { left: 39.67%; }
.timer #timer1-hour2, .timer #timer2-hour2 { left: 50.56%; }
.timer #timer1-min1, .timer #timer2-min1 { left: 64.44%; }
.timer #timer1-min2, .timer #timer2-min2 { left: 75.33%; }
.timer #timer1-sec1, .timer #timer2-sec1 { left: 89.44%; }
.timer #timer1-sec2, .timer #timer2-sec2 { left: 95.33%; } 

</style>

<div class="timer1__wrap">
    <!-- <img src="//jstyle07.jpg3.kr/SITE/EVENT/2025/0310_pre_event/event_03.jpg" /> -->
    <div id="timer1" class="timer timer1">
        <span id="timer1-day1"></span><span id="timer1-day2"></span>
        <span id="timer1-hour1"></span><span id="timer1-hour2"></span>
        <span id="timer1-min1"></span><span id="timer1-min2"></span>
        <span id="timer1-sec1"></span><span id="timer1-sec2"></span>
    </div>
</div>

<script>
function init() {
    countdownTimer('timer1', '2025/03/17 10:00:00'); // 첫번째 타이머
    countdownTimer('timer2', '2025/03/17 10:00:00'); // 두번째 타이머
}

function countdownTimer(timerId, endTime) {
    let interval;

    function startTimer() {
        clearInterval(interval); // 기존 인터벌 제거 (중복 방지)

        const finalEndTime = new Date(endTime).getTime(); // 각 타이머의 종료 시간

        interval = setInterval(() => {
            const currentTime = new Date().getTime(); // 현재 시간 (밀리초)
            const diff = finalEndTime - currentTime; // 남은 시간 계산

            // 최종 종료 시간을 초과하면 타이머 종료
            if (diff <= 0) {
                clearInterval(interval);
                document.getElementById(`${timerId}-day1`).innerText = '0';
                document.getElementById(`${timerId}-day2`).innerText = '0';
                document.getElementById(`${timerId}-hour1`).innerText = '0';
                document.getElementById(`${timerId}-hour2`).innerText = '0';
                document.getElementById(`${timerId}-min1`).innerText = '0';
                document.getElementById(`${timerId}-min2`).innerText = '0';
                document.getElementById(`${timerId}-sec1`).innerText = '0';
                document.getElementById(`${timerId}-sec2`).innerText = '0';
                return;
            }

            // ✅ "남은 일(day)과 24시간 단위로 변환한 시간(hours) 계산"
            const totalHours = Math.floor(diff / (1000 * 60 * 60)); // 전체 남은 시간
            const days = Math.floor(totalHours / 24); // 24시간 기준 남은 일수
            const hours = totalHours % 24; // 24시간 기준 남은 시간
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            // 두 자리 숫자로 변환
            const daysStr = String(days).padStart(2, '0');
            const hoursStr = String(hours).padStart(2, '0');
            const minsStr = String(mins).padStart(2, '0');
            const secsStr = String(secs).padStart(2, '0');

            // 숫자를 개별적으로 분리하여 해당 타이머의 HTML 요소 업데이트
            document.getElementById(`${timerId}-day1`).innerText = daysStr[0];
            document.getElementById(`${timerId}-day2`).innerText = daysStr[1];
            document.getElementById(`${timerId}-hour1`).innerText = hoursStr[0];
            document.getElementById(`${timerId}-hour2`).innerText = hoursStr[1];
            document.getElementById(`${timerId}-min1`).innerText = minsStr[0];
            document.getElementById(`${timerId}-min2`).innerText = minsStr[1];
            document.getElementById(`${timerId}-sec1`).innerText = secsStr[0];
            document.getElementById(`${timerId}-sec2`).innerText = secsStr[1];
        }, 1000);
    }

    startTimer(); // 타이머 실행
}


init();
</script>
