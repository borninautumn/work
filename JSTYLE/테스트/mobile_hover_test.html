<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mobile hover -> touch</title>

    <style>
        body { position: relative; }
        .hover {
            width: 100px; height: 100px;
            background-color: black;
            color: black;
            text-align: center;
            line-height: 100px;
            transition: background .6s;
        }
        .hover:hover {
            background-color: red;
            color: white;
            animation-name: move;
            animation-duration: 1s;
            animation-timing-function: ease;
            animation-fill-mode: forwards;
        }
        @keyframes move {
            from {
                width: 100px;
            }
            to {
                width: 500px;
            }
        }
    </style>
</head>
<body>
    <div class="hover">this is hover</div>

    <script>
        const hover = document.querySelector('.hover');
        hover.addEventListener('touchstart', function() {}, true);
    </script>
</body>
</html>
