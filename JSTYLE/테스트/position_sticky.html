<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bbs-table-view td {
            display: flex;
            flex-direction: row;
            gap: 2%;
        }

        .bbs-table-view .data-bd-cont {
            width: 35%;
        }

        .bbs-table-view .fixed-img-collist {
            width: 65%;
            border-top: 0;
        }

        .bbs-table-view .fixed-img-collist ul {
            width: 100%;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 2%;
            padding: 0;
        }

        .bbs-table-view .fixed-img-collist ul li {
            padding: 0 0 15px;
            width: 30%;
        }

        .bbs-table-view .fixed-img-collist ul li a span.prd img {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="container" style="position: relative; height: auto;">
            <div class="nav" style="height: 500px;"></div>
            <div class="wrapper" style="position: sticky; top: 0; left: 0;">
                <div style="position: relative; width:50%; padding-bottom: 20%;">
                    <iframe
                        allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen
                        allowscriptaccess=always frameborder=0
                        src="https://www.youtube.com/embed/4E93WR53xQs?hl=ko_KR&version=3&vq=hd720&autoplay=0&loop=1&showinfo=0&controls=1&rel=0&playlist=4E93WR53xQs"
                        style=position:absolute;width:100%;height:100% type=application/x-shockwave-flash>
                    </iframe>
                </div>
            </div>
            <div class="icons" style="position: relative;height: 300px; background-color: rgba(0, 0, 0, 0.1);"></div>
            <div class="products" style="position: relative;height: 1000px; background-color: rgba(0, 0, 0, 0.2);"></div>
        </div>
    </div>
    
    
</body>

</html>
