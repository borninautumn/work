<style>
    html,
    body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        font-family: sans-serif;
    }

    /* main 영역 */
    main {
        position: relative;
        width: 100%;
        max-width: 1200px;
        /* PC 최대 폭 */
        margin: 0 auto;
    }

    /* 오버레이 */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        justify-content: center;
        align-items: flex-end;
        z-index: 9998;
    }

    /* 오버레이 + 팝업 열림 */
    .overlay.show {
        display: flex;
    }

    /* 팝업 */
    .popup {
        width: 100%;
        max-width: 800px;
        /* PC에서 최대 폭 */
        height: 70%;
        /* PC 기본 높이 */
        background: #fff;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -2px 15px rgba(0, 0, 0, 0.25);
        transform: translateY(100%);
        transition: transform 0.35s ease;
        z-index: 9999;
        overflow-x: hidden;
        /* 가로 스크롤 방지 */
    }

    /* 팝업 열림 */
    .overlay.show .popup {
        transform: translateY(0);
    }

    /* 팝업 컨텐츠 */
    .popup__content {
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
    }

    /* iframe */
    .popup__content iframe {
        flex: 1;
        width: 100%;
        height: 100%;
        border: none;
        overflow-x: hidden;
        overflow-y: auto;
        /* 세로 스크롤만 */
        display: block;
    }

    /* 닫기 버튼 */
    .popup__content button {
        padding: 12px;
        background: #f5f5f5;
        border: none;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        border-radius: 0 0 16px 16px;
    }

    /* 오픈 버튼 */
    #openBtn {
        width: 100%;
        height: 100px;
        background-color: #000;
        color: #fff;
        font-size: 16px;
        border: none;
        cursor: pointer;
    }

    /* =================== */
    /* 반응형 */
    /* 모바일: 768px 이하 */
    @media (max-width: 768px) {
        .popup {
            height: 90%;
            /* 모바일에서 높이 더 크게 */
            border-radius: 16px 16px 0 0;
        }

        #openBtn {
            height: 80px;
            font-size: 14px;
        }
    }

    /* 초소형 모바일: 480px 이하 */
    @media (max-width: 480px) {
        .popup {
            height: 95%;
            /* 거의 전체 화면 */
            border-radius: 16px 16px 0 0;
        }

        #openBtn {
            height: 70px;
            font-size: 13px;
        }
    }
</style>

<main>
    <button id="openBtn">팝업 열기</button>

    <!-- 오버레이 + 팝업 -->
    <div class="overlay" id="overlay">
        <div class="popup" id="popup">
            <div class="popup__content">
                <h2>외부 페이지</h2>
                <iframe src="https://service-area.pingpongpingpong.com/"></iframe>
                <button id="closeBtn">닫기</button>
            </div>
        </div>
    </div>
</main>

<script>
    const openBtn = document.getElementById("openBtn");
    const closeBtn = document.getElementById("closeBtn");
    const overlay = document.getElementById("overlay");

    openBtn.addEventListener("click", () => {
        overlay.classList.add("show");
    });

    closeBtn.addEventListener("click", () => {
        overlay.classList.remove("show");
    });

    // 배경 클릭 시 닫힘
    overlay.addEventListener("click", (e) => {
        if (e.target === overlay) overlay.classList.remove("show");
    });
</script>
